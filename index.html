<!DOCTYPE html>
<html lang="ja">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>TC Clock</title>

  <link rel="manifest" href="manifest.json">

  <meta
    name="theme-color"
    content="#000000"
  >

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="container">

    <img src="logo.png" id="logo">

    <div id="status">
      リハーサル
    </div>

    <div id="clock">

      <span id="mainTime">
        00:00:00
      </span>

      <span id="frame">
        :00
      </span>

    </div>

    <div id="date">
      0000/00/00
    </div>

    <!-- LTC -->
    <div id="ltcControls">

      <span>LTC</span>

      <select id="fpsSelect">

        <option value="29.97" selected>
          29.97
        </option>

        <option value="23.976">
          23.976
        </option>

      </select>

      <button id="btnJam">
        Push Jam
      </button>

      <span id="ltcStatus">
        STOP
      </span>

    </div>

  </div>

  <!-- 操作 -->
  <div class="controls">

    <button id="btnRehearsal">
      リハ
    </button>

    <button id="btnLive">
      本番
    </button>

    <input
      id="customInput"
      type="text"
      placeholder="カスタム表示"
    >

    <button id="btnApply">
      反映
    </button>

  </div>

  <script src="app.js"></script>

</body>
</html>
