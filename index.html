<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Clock</title>

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
</head>

<body>

  <div class="container">

    <img src="logo.png" id="logo">

    <div id="status">リハーサル</div>

    <div id="clock">
      <span id="mainTime">00:00:00</span><span id="frame">:00</span>
    </div>

    <div id="date">0000/00/00</div>

  </div>

  <!-- 操作UI -->
  <div class="controls">

    <button id="btnRehearsal">リハ</button>
    <button id="btnLive">本番</button>

    <input id="customInput" type="text" placeholder="カスタム表示">

    <button id="btnApply">反映</button>

  </div>

  <script src="app.js"></script>
</body>
</html>
